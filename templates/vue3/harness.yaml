identity:
  name: vue3-harness
  version: "1.0.0"
  createdAt: "2026-04-06"
  createdBy: chaos-harness
  suitableFor:
    - vue3
    - vite-vue
    - composition-api
    - typescript-vue
    - pinia
  confidenceThreshold: 0.85

selfCheck:
  activationConditions:
    - field: "package.json.dependencies.vue"
      operator: "versionMatches"
      value: "^3\\."
      description: "Vue 3.x dependency detected"
    - field: "files"
      operator: "contains"
      value: "*.vue"
      description: ".vue component files found"
    - field: "vite.config.*"
      operator: "exists"
      description: "Vite config detected (modern Vue 3 setup)"
  warningConditions:
    - field: "package.json.devDependencies.@vue/cli-service"
      operator: "exists"
      description: "Vue CLI with Vue 3 - consider Vite migration"
    - field: "tsconfig.json"
      operator: "notExists"
      description: "No TypeScript - Vue 3 + TS recommended"
    - field: "nodeVersion"
      operator: "matches"
      value: "^14\\."
      description: "Node 14 may have issues with Vite"
  changeMonitor:
    watchedFiles:
      - "package.json"
      - "vite.config.ts"
      - "vite.config.js"
      - "tsconfig.json"
      - "src/**/*.vue"
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/router/*.ts"
      - "src/stores/*.ts"
    threshold: 5
  redFlags:
    - thought: "I'll use Options API for consistency"
      reality: "Vue 3 Composition API provides better type inference. Consider refactoring."
      persuasionPrinciple: "authority"
    - thought: "I'll mutate reactive state directly"
      reality: "Reactive objects can be mutated, but ref.value must be assigned. Check ref vs reactive."
      ironLawRef: "IL-VUE003"
      persuasionPrinciple: "commitment"
    - thought: "I'll skip TypeScript for this component"
      reality: "TypeScript prevents runtime errors in Vue 3. Add types."
      ironLawRef: "IL005"
      persuasionPrinciple: "socialProof"
    - thought: "Pinia is new, I'll use Vuex"
      reality: "Pinia is the official Vue 3 state management. Vuex is legacy."
      persuasionPrinciple: "scarcity"

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory before output"
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Scan project first"
  - id: "IL003"
    rule: "NO COMPLETION CLAIMS WITHOUT VERIFICATION"
    enforcement: block
    violationAction: "Run vite dev/build to verify"
  - id: "IL004"
    rule: "NO VERSION CHANGES WITHOUT USER CONSENT"
    enforcement: block
    violationAction: "Ask before changing Vue/Vite/dependency versions"
  - id: "IL005"
    rule: "NO HIGH-RISK CONFIG MODIFICATIONS WITHOUT APPROVAL"
    enforcement: block
    violationAction: "Vite config changes need user review"
  - id: "IL-VUE001"
    rule: "NO DIRECT REF MUTATION (use .value)"
    enforcement: block
    violationAction: "Refs need .value assignment. Reactive objects can be mutated directly."
  - id: "IL-VUE002"
    rule: "PROPS ARE READ-ONLY"
    enforcement: block
    violationAction: "Props are immutable. Emit events for parent updates."
  - id: "IL-VUE003"
    rule: "COMPOSABLES MUST BE PURE FUNCTIONS"
    enforcement: warn
    violationAction: "Composables should not mutate external state"
  - id: "IL-VUE004"
    rule: "TEMPLATE MODIFICATIONS NEED RENDER CHECK"
    enforcement: block
    violationAction: "Run dev server after template changes"

loopholeClosure:
  - pattern: "just a template tweak"
    rebuttal: "Templates affect render performance. Check with Vite dev server."
  - pattern: "TypeScript is optional in Vue 3"
    rebuttal: "Optional ≠ recommended. Vue 3 + TS = better DX and fewer bugs."
  - pattern: "I'll mix Options and Composition API"
    rebuttal: "Mixed syntax = confusion. Pick one style for the component."
  - pattern: "Pinia store changes don't need tracking"
    rebuttal: "Pinia has devtools support. Check state changes in DevTools."
  - pattern: "I'll skip Suspense for async components"
    rebuttal: "Suspense handles loading states. Add for async components."

recommendations:
  - id: "R-VUE001"
    rule: "Run vite dev after component changes"
    skipCondition: "User explicitly skips"
  - id: "R-VUE002"
    rule: "Use TypeScript for all new components"
    skipCondition: "Existing JS-only project"
  - id: "R-VUE003"
    rule: "Check parent/child component contracts"
    skipCondition: "Standalone component"
  - id: "R-VUE004"
    rule: "Use defineComponent for type inference"
    skipCondition: "Using <script setup lang='ts'>"
  - id: "R-VUE005"
    rule: "Run type check with vue-tsc"
    skipCondition: "No TypeScript configured"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "npm run dev"
    production: "npm run build"
    typeCheck: "vue-tsc --noEmit"
    lint: "npm run lint"
  testFramework:
    primary: "Vitest"
    e2e: "Playwright / Cypress"
    component: "@vue/test-utils"
  inferredCodeStyle:
    namingConvention:
      componentFile: "PascalCase.vue"
      composableFile: "use*.ts"
      storeFile: "*.store.ts"
    scriptStyle: "script-setup"  # Vue 3 recommended
  componentPatterns:
    apiStyle: "Composition API"
    stateManagement: "Pinia"
    router: "Vue Router 4"
    asyncHandling: "Suspense"

antiBypass:
  - id: "AB-VUE001"
    excuse: "This is a simple ref change"
    rebuttal: "Ref changes trigger reactivity. Check dependent computed/watch."
    ironLawRef: "IL-VUE001"
    persuasionPrinciple: "authority"
  - id: "AB-VUE002"
    excuse: "Vite is fast, no need to test"
    rebuttal: "Fast dev ≠ correct code. Run vite build for production check."
    ironLawRef: "IL003"
    persuasionPrinciple: "socialProof"
  - id: "AB-VUE003"
    excuse: "I'll use Vue 2 style for compatibility"
    rebuttal: "Vue 2 style in Vue 3 = missed features. Learn Composition API."
    ironLawRef: "IL005"
    persuasionPrinciple: "scarcity"
  - id: "AB-VUE004"
    excuse: "TypeScript errors are just warnings"
    rebuttal: "TS errors = potential runtime errors. Fix them."
    ironLawRef: "IL005"
    persuasionPrinciple: "commitment"
  - id: "AB-VUE005"
    excuse: "I'll update Vue 3 minor version without asking"
    rebuttal: "Minor versions can break plugins. Check compatibility."
    ironLawRef: "IL004"
    persuasionPrinciple: "authority"

effectivenessLog: "output/{version}/effectiveness-log.md"