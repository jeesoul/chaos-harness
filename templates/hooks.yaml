# Chaos Harness Hooks 配置模板

# 用户可自定义钩子配置
# 此文件会被复制到 ~/.claude/harness/hooks.yaml

## 钩子启用状态

hooks_enabled:
  session_start: true      # 会话开始注入铁律
  iron_law_check: true     # 铁律检查
  laziness_detect: true    # 偷懒检测
  learning_update: true    # 学习记录
  workflow_track: true     # 工作流追踪
  stop: true               # 完成声明分析
  pre_compact: true        # 压缩前保存

## 钩子优先级配置

hook_priority:
  iron_law_check: 100      # 铁律检查高优先级
  stop: 90                 # 完成分析次高
  workflow_track: 70       # 工作流追踪中等
  laziness_detect: 50      # 偷懒检测较低
  learning_update: 30      # 学习记录最低

## 铁律启用配置

iron_laws:
  IL001:
    enabled: true
    severity: critical
    action: block          # block | warn | log

  IL002:
    enabled: true
    severity: critical
    action: block

  IL003:
    enabled: true
    severity: critical
    action: block

  IL004:
    enabled: true
    severity: critical
    action: warn           # 版本变更先警告

  IL005:
    enabled: true
    severity: warning
    action: warn           # 高风险配置警告

## 偷懒模式配置

laziness_patterns:
  LP001:
    enabled: true
    severity: critical
    action: block          # 无验证完成必须阻止

  LP002:
    enabled: true
    severity: critical
    action: warn           # 无根因修复警告

  LP003:
    enabled: true
    severity: warning
    action: log            # 超时只记录

  LP004:
    enabled: true
    severity: critical
    action: block          # 跳过测试阻止

  LP005:
    enabled: true
    severity: critical
    action: block          # 擅自版本变更阻止

  LP006:
    enabled: true
    severity: critical
    action: block          # 高风险配置阻止

## 超时阈值配置

timeout_thresholds:
  small_project: 3600      # 1小时
  medium_project: 7200     # 2小时
  large_project: 14400     # 4小时
  warning_ratio: 1.5       # 超过阈值1.5倍警告

## 学习配置

learning:
  auto_generate: true      # 自动从违规生成学习
  max_entries: 100         # 最大学习条目数
  retention_days: 30       # 学习保留天数

## 绕过检测关键词

bypass_keywords:
  - "简单修复"
  - "simple fix"
  - "跳过测试"
  - "skip test"
  - "就这一次"
  - "just this once"
  - "快速处理"
  - "quick fix"
  - "暂时这样"
  - "temporary fix"
  - "先不管"
  - "ignore for now"

## 高风险配置文件

high_risk_configs:
  - ".env"
  - "settings.json"
  - "credentials"
  - "secrets"
  - "private"
  - "auth"
  - "password"
  - "token"

## 压缩存档配置

compact_archive:
  enabled: true
  max_archives: 10         # 保留最近10次存档
  preserve_items:
    - learnings            # 保存学习记录
    - violations           # 保存违规记录
    - workflow_state       # 保存工作流状态
    - summary              # 保存摘要