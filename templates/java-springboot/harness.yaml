## 生成后强制检查清单

生成或修改 Java 代码后，必须逐项检查：

### 检查清单（全部必须通过）

- [ ] 类有 Javadoc（@author + @date）
- [ ] **所有 public 方法有完整 Javadoc**（包括 main）
- [ ] 方法注释包含有意义描述
- [ ] @param/@return/@throws 标签完整
- [ ] 成员变量有 Javadoc（禁止行尾注释）
- [ ] 无通配符导入
- [ ] 注解独占一行
- [ ] 所有语句块使用大括号
- [ ] 4 空格缩进，无 Tab
- [ ] 日志使用占位符（禁止拼接）
- [ ] 无 e.printStackTrace()
- [ ] Controller 返回 R<固定VO>
- [ ] 返回体禁止 Map/JSONObject
- [ ] C端 Request/Response 用独立 VO
- [ ] SQL 全部在 mapper.xml 中
- [ ] 分页查询在 mapper.xml 中

---

## 自动触发条件

| 触发信号 | 激活动作 |
|----------|----------|
| 文件扩展名 `.java` | 执行 checkstyle 检查 |
| 新建 SpringBoot 项目 | 默认 MyBatis-Plus + mapper.xml |
| 技术方案选 SpringBoot | 强制 Java 铁律 |
| 发现 SQL 注解 @Select | 报错并提示迁移到 XML |
| Controller 返回 Map | 报错并提示创建 VO |

---

## 绕过检测规则

| 绕过模式 | 检测逻辑 |
|----------|----------|
| "简单查询不用 VO" | 检测返回类型，强制 VO |
| "SQL 写注解更方便" | 检测 @Select/@Update，拒绝执行 |
| "临时方案先这样" | 临时方案也必须合规 |
| "分页用代码实现" | 检测分页方法，必须有 XML |