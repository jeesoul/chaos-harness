# Java SpringBoot Harness 配置

## 适用场景

- 技术方案选择 SpringBoot 时自动激活
- 全新项目默认使用 MyBatis-Plus（用户未指定时）
- 强制执行 Java 代码风格规范

---

## Java 代码铁律（强制执行）

### IL-JAVA001: 代码风格规范
**NO CODE WITHOUT CHECKSTYLE**

所有 Java 代码必须严格遵循 checkstyle 规范：

#### 基础格式
- UTF-8 字符集
- 每行最大 125 字符
- 4 个空格缩进，禁止 Tab
- 注解独占一行，不允许与代码同行
- 必须使用大括号，即使是单行语句

#### 命名规范
- 包名：全小写 `^[a-z]+(\.[a-z][a-z0-9]*)*$`
- 类名/接口名/枚举名：大驼峰 (PascalCase)
- 变量名：小驼峰 (camelCase)
- 常量名：全大写下划线分隔 (UPPER_SNAKE_CASE)
- 集合变量名：复数形式 (users, userList)
- 泛型类型参数：单个大写字母 (T, E, K, V, R)

#### 注释规范（强制）
```java
/**
 * 类描述
 *
 * @author 作者名
 * @date YYYY-MM-DD
 */
public class ClassName { }

/**
 * 方法描述（有意义的内容，禁止泛泛描述）
 *
 * @param paramName 参数说明
 * @return 返回值说明
 * @throws ExceptionType 异常说明
 */
public ReturnType methodName(ParamType paramName) { }

/**
 * 成员变量说明（禁止行尾注释）
 */
private FieldType fieldName;
```

**⚠️ 强制检查：所有 public 方法（包括 main）必须有完整 Javadoc！**

#### 导入规范
- **禁止通配符导入** `import xxx.*`
- 导入顺序：java.* → javax.* → 第三方库 → 本项目包

#### 日志规范
- 使用 `@Slf4j`
- **必须使用占位符**：`log.info("处理用户，userId: {}", userId)`
- **禁止字符串拼接**：`log.info("处理用户：" + userId)` ❌

---

### IL-JAVA002: Controller 接口规范
**NO CONTROLLER WITHOUT VO**

#### 请求参数
- 参数超过 3 个必须封装成实体
- 简单查询（1-2 参数）可用基本类型

#### 返回结果（强制）
- **必须使用统一响应体**：`R<返回体>`
- **返回体必须是固定实体类**：禁止 `Map`、`JSONObject`、`Object`

#### C端接口（app/H5/toC）
| 类型 | 要求 |
|------|------|
| Request | **必须使用独立 VO** `{业务名}RequestVO` |
| Response | **必须使用独立 VO** `{业务名}ResponseVO` |

#### B端接口（web/admin/toB）
| 类型 | 要求 |
|------|------|
| Request | 尽量使用独立 VO |
| Response | **必须使用独立 VO** |

#### 路径前缀
- C端：`/app/` 或 `/h5/`
- B端：`/web/` 或 `/admin/`

