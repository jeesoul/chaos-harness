### IL-JAVA003: MyBatis-Plus 强制规范
**NO SQL IN JAVA CODE**

#### 默认技术栈
- 全新项目用户未指定 → **默认使用 MyBatis-Plus**
- **禁止在代码中写 SQL**（包括 @Select、@Update 等注解）

#### Mapper XML 强制规范
所有数据库操作必须写在 `mapper.xml` 文件中：

```xml
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE mapper PUBLIC "-//mybatis.org//DTD Mapper 3.0//EN"
    "http://mybatis.org/dtd/mybatis-3-mapper.dtd">

<mapper namespace="com.xxx.mapper.XxxMapper">

    <!-- resultMap 定义 -->
    <resultMap type="com.xxx.entity.XxxEntity" id="xxxMap">
        <result property="id" column="id"/>
        <result property="fieldName" column="field_name"/>
        <!-- 所有字段必须列出 -->
    </resultMap>

    <!-- 基础列定义（复用） -->
    <sql id="baseColumns">
        id, field_name, create_time, update_time
    </sql>

    <!-- 分页查询：必须使用 mapper.xml -->
    <select id="pageByEntity" resultType="com.xxx.entity.XxxEntity">
        SELECT <include refid="baseColumns"/>
        FROM table_name
        <where>
            <if test="entity.field != null and entity.field != ''">
                AND field = #{entity.field}
            </if>
        </where>
    </select>

    <!-- 列表查询 -->
    <select id="listByEntity" resultType="com.xxx.entity.XxxEntity">
        SELECT <include refid="baseColumns"/>
        FROM table_name
        <where>
            <if test="entity.id != null">
                AND id = #{entity.id}
            </if>
        </where>
    </select>

</mapper>
```

#### 分页查询铁律
**NO PAGINATION WITHOUT XML**

分页查询必须写在 mapper.xml 中，使用 `<include>` 复用列定义：

```java
// Mapper 接口
public interface XxxMapper extends BaseMapper<XxxEntity> {
    /**
     * 分页查询
     *
     * @param page 分页参数
     * @param entity 查询条件
     * @return 分页结果
     */
    IPage<XxxEntity> pageByEntity(
        @Param("page") IPage<XxxEntity> page,
        @Param("entity") XxxEntity entity
    );
}
```

#### 禁止行为
| 禁止项 | 原因 |
|--------|------|
| `@Select("SELECT ...")` | SQL 必须在 XML 中 |
| `@Update("UPDATE ...")` | SQL 必须在 XML 中 |
| `@Insert("INSERT ...")` | SQL 必须在 XML 中 |
| 代码拼接 SQL 字符串 | 安全隐患、不可维护 |

---

### IL-JAVA004: 代码质量规范
**NO BAD PRACTICES**

#### 禁止项
- `System.exit()` ❌
- `e.printStackTrace()` ❌（使用 log.error）
- 字符串字面量比较 ❌（使用 `equals()`）
- 返回 null 集合 ❌（返回空集合）

#### 方法规范
- 参数数量 ≤ 10
- 方法长度 ≤ 120 行
- 嵌套深度 ≤ 2 层

