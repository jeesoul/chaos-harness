identity:
  name: java-spring-harness
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: scanner
  suitableFor:
    - java-spring
    - spring-boot
    - java
  confidenceThreshold: 0.8

selfCheck:
  activationConditions:
    - field: "projectType.type"
      operator: "equals"
      value: "java-spring"
      description: "Project is Java Spring Boot"
    - field: "buildTool.name"
      operator: "equals"
      value: "maven"
      description: "Uses Maven build tool"
  warningConditions:
    - field: "language.version"
      operator: "matches"
      value: '1\.[0-8]'
      description: "Legacy Java version detected"
  changeMonitor:
    watchedFiles:
      - "pom.xml"
      - "build.gradle"
      - "application.yml"
      - "application.properties"
    threshold: 3

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory selection before generating documents"
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Run scanner first to gather project information"
  - id: "IL003"
    rule: "NO ENVIRONMENT CLAIMS WITHOUT ACTUAL EXECUTION"
    enforcement: block
    violationAction: "Execute environment checks before reporting status"
  - id: "IL004"
    rule: "NO WORKFLOW STEP SKIP WITHOUT EXPLICIT USER CONSENT"
    enforcement: warn
    violationAction: "Log skipped step and require user acknowledgment"
  - id: "IL005"
    rule: "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
    enforcement: block
    violationAction: "Require verification step before marking complete"

recommendations:
  - id: "R001"
    rule: "Use Spring Boot best practices for dependency injection"
    skipCondition: "Legacy codebase with existing patterns"
    skipRecord: "Record reason for skipping in VERSION-LOG.md"
  - id: "R002"
    rule: "Follow Java naming conventions (PascalCase for classes, camelCase for methods)"
    skipCondition: "Existing codebase with different conventions"
  - id: "R003"
    rule: "Run tests before committing changes"
    skipCondition: "No test framework configured"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "mvn clean install -DskipTests"
    withTests: "mvn clean install"
  testFramework:
    primary: "junit"
    mock: "mockito"
  inferredCodeStyle:
    namingConvention:
      className: "PascalCase"
      methodName: "camelCase"
      constantName: "SCREAMING_SNAKE_CASE"
    importStyle: "wildcard-avoid"

antiBypass:
  - id: "AB001"
    excuse: "The code is too legacy to follow modern practices"
    rebuttal: "Legacy code benefits most from structured practices. Start with small improvements in new code."
    ironLawRef: "R001"
  - id: "AB002"
    excuse: "Tests take too long to run"
    rebuttal: "Skipping tests leads to regressions. Run at least the affected test suite."
    ironLawRef: "R003"
  - id: "AB003"
    excuse: "I don't have time for proper documentation"
    rebuttal: "Documentation saves time for future developers including yourself. Version-locked docs prevent confusion."
    ironLawRef: "IL001"

effectivenessLog: "version-logs/effectiveness.md"
