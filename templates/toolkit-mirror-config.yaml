# Chaos Harness Mirror Configuration
# 镜像加速配置 - 针对国内网络环境优化

mirrors:
  # GitHub 镜像
  github:
    official: "github.com"
    alternatives:
      - domain: "kgithub.com"
        name: "KGitHub"
        region: "CN"
        speed: "fast"
      - domain: "ghproxy.com"
        name: "GHProxy"
        region: "CN"
        speed: "medium"
        prefix: "https://ghproxy.com/"
      - domain: "gitclone.com"
        name: "GitClone"
        region: "CN"
        speed: "medium"
      - domain: "hub.fastgit.xyz"
        name: "FastGit"
        region: "CN"
        speed: "fast"

  # npm 镜像
  npm:
    official: "registry.npmjs.org"
    alternatives:
      - domain: "registry.npmmirror.com"
        name: "淘宝镜像"
        region: "CN"
        speed: "fast"
      - domain: "npm.taobao.org"
        name: "淘宝镜像 (旧)"
        region: "CN"
        speed: "medium"
        deprecated: true

  # Playwright 浏览器下载
  playwright:
    browsers:
      official: "playwright.azureedge.net"
      alternatives:
        - domain: "playwright-browser.blob.core.windows.net"
          name: "Azure Backup"
          region: "Global"
        - domain: "npmmirror.com/mirrors/playwright"
          name: "淘宝 Playwright 镜像"
          region: "CN"
          env: "PLAYWRIGHT_DOWNLOAD_HOST=https://npmmirror.com/mirrors/playwright"

# 工具安装配置
tools:
  - id: skill-creator
    name: "Skill Creator"
    description: "自动创建业务场景专属 skill"
    plugin_id: "skill-creator@claude-plugins-official"
    github_repo: "anthropics/claude-plugins-official"
    official_install: "claude plugins install skill-creator@claude-plugins-official"
    mirror_install:
      - "git clone https://kgithub.com/anthropics/claude-plugins-official.git"
      - "claude plugins marketplace add ./claude-plugins-official"
      - "claude plugins install skill-creator@claude-plugins-official"

  - id: superpowers-chrome
    name: "Chrome DevTools MCP"
    description: "Chrome DevTools Protocol 浏览器自动化"
    plugin_id: "superpowers-chrome@superpowers-marketplace"
    marketplace: "superpowers-marketplace"
    official_install: "claude plugins install superpowers-chrome@superpowers-marketplace"

  - id: ui-ux-pro-max
    name: "UI/UX Pro Max"
    description: "UI/UX 设计评审 + Playwright 测试生成"
    plugin_id: "ui-ux-pro-max@ui-ux-pro-max-skill"
    github_repo: "NicsterV2/ui-ux-pro-max-skill"
    official_install: "claude plugins install ui-ux-pro-max@ui-ux-pro-max-skill"
    mirror_install:
      - "git clone https://ghproxy.com/https://github.com/NicsterV2/ui-ux-pro-max-skill.git"
      - "claude plugins marketplace add ./ui-ux-pro-max-skill"
      - "claude plugins install ui-ux-pro-max@ui-ux-pro-max-skill"

  - id: webapp-testing
    name: "Webapp Testing"
    description: "Playwright 自动化测试 - 自动写脚本、跑测试、截屏"
    plugin_id: "webapp-testing@anthropics/skills"
    github_repo: "anthropics/skills"
    official_install: "claude plugins install webapp-testing@anthropics/skills"
    mirror_install:
      - "git clone https://kgithub.com/anthropics/skills.git"
      - "claude plugins marketplace add ./skills"
      - "claude plugins install webapp-testing@anthropics/skills"
    dependencies:
      - "playwright"
      - "@playwright/test"

# 自动检测配置
detection:
  check_command: "claude plugins list"
  installed_pattern: "{plugin_id}"
  timeout: 30000

# 网络测试配置
network_test:
  targets:
    - url: "https://github.com"
      timeout: 5000
      name: "GitHub"
    - url: "https://kgithub.com"
      timeout: 5000
      name: "KGitHub Mirror"
    - url: "https://registry.npmmirror.com"
      timeout: 5000
      name: "Taobao npm Mirror"

# 铁律配置
iron_laws:
  - id: IL-AUTO-001
    rule: "NO AUTOMATION WITHOUT TOOLKIT CHECK"
    severity: warning

  - id: IL-AUTO-002
    rule: "NO BYPASS ON INSTALL FAILURE"
    severity: critical