identity:
  name: "node-express-harness"
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: "scanner"
  suitableFor:
    - "node-express"
    - "Node.js"
    - "Express"
  confidenceThreshold: 0.80

selfCheck:
  activationConditions:
    - field: "projectType"
      operator: "equals"
      value: "node-express"
      description: "Project type must be node-express"
    - field: "nodeVersion"
      operator: "matches"
      value: "^(16|18|20)\\."
      description: "Node.js version must be 16, 18, or 20"
  warningConditions:
    - field: "projectType.confidence"
      operator: "matches"
      value: "^0\\.[0-7]"
      description: "Low confidence, recommend manual review"
    - field: "packageJson.scripts.test"
      operator: "notExists"
      description: "No test script defined"
  changeMonitor:
    watchedFiles:
      - "package.json"
      - "package-lock.json"
      - "src/**/*.js"
      - "src/**/*.ts"
      - "*.config.js"
      - "*.config.ts"
    threshold: 0.20

ironLaws:
  - id: "IL001"
    rule: "没有验证就不声称完成"
    enforcement: "block"
    violationAction: "阻止提交，要求重新验证"
  - id: "IL002"
    rule: "没有根因分析就不修复bug"
    enforcement: "block"
    violationAction: "阻止修复，要求Phase 1调查"
  - id: "IL003"
    rule: "npm test失败必须修复"
    enforcement: "block"
    violationAction: "阻止进入下一阶段"
  - id: "IL004"
    rule: "版本号不可随意更改"
    enforcement: "block"
    violationAction: "阻止文档写入"
  - id: "IL005"
    rule: "依赖版本变更必须用户确认"
    enforcement: "block"
    violationAction: "暂停操作"
  - id: "IL006"
    rule: "package.json变更必须同步lock文件"
    enforcement: "block"
    violationAction: "阻止提交，要求npm install"

recommendations:
  - id: "R001"
    rule: "使用ESLint检查代码风格"
    skipCondition: "用户明确说跳过"
  - id: "R002"
    rule: "单元测试覆盖率>=60%"
    skipCondition: "历史项目无测试框架"
  - id: "R003"
    rule: "使用Prettier格式化代码"
    skipCondition: "项目无Prettier配置"
  - id: "R004"
    rule: "使用TypeScript增强类型安全"
    skipCondition: "纯JavaScript项目"
  - id: "R005"
    rule: "配置express安全头(helmet)"

antiBypass:
  - id: "AB001"
    excuse: "这是简单修改，不需要测试"
    rebuttal: "简单修改也需要验证，防止回归"
    ironLawRef: "IL003"
  - id: "AB002"
    excuse: "用户没说版本号，我默认用最新的"
    rebuttal: "用户没说=版本不变"
    ironLawRef: "IL004"
  - id: "AB003"
    excuse: "这个bug很简单，直接改一行就行"
    rebuttal: "简单bug也有根因，不分析可能导致类似bug重复出现"
    ironLawRef: "IL002"
  - id: "AB004"
    excuse: "package-lock.json会自动生成，不用管"
    rebuttal: "必须同步提交，确保团队依赖一致"
    ironLawRef: "IL006"