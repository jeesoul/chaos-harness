identity:
  name: "python-django-harness"
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: "scanner"
  suitableFor:
    - "python-django"
    - "Django"
    - "Python"
  confidenceThreshold: 0.80

selfCheck:
  activationConditions:
    - field: "projectType"
      operator: "equals"
      value: "python-django"
      description: "Project type must be python-django"
    - field: "pythonVersion"
      operator: "matches"
      value: "^(3\\.(9|10|11|12))"
      description: "Python version must be 3.9, 3.10, 3.11, or 3.12"
  warningConditions:
    - field: "projectType.confidence"
      operator: "matches"
      value: "^0\\.[0-7]"
      description: "Low confidence, recommend manual review"
    - field: "requirements.txt"
      operator: "notExists"
      description: "No requirements.txt found"
    - field: "djangoVersion"
      operator: "matches"
      value: "^[12]\\."
      description: "Django version < 3, upgrade recommended"
  changeMonitor:
    watchedFiles:
      - "requirements.txt"
      - "pyproject.toml"
      - "**/*.py"
      - "settings.py"
      - "urls.py"
    threshold: 0.20

ironLaws:
  - id: "IL001"
    rule: "没有验证就不声称完成"
    enforcement: "block"
    violationAction: "阻止提交，要求重新验证"
  - id: "IL002"
    rule: "没有根因分析就不修复bug"
    enforcement: "block"
    violationAction: "阻止修复，要求Phase 1调查"
  - id: "IL003"
    rule: "pytest失败必须修复"
    enforcement: "block"
    violationAction: "阻止进入下一阶段"
  - id: "IL004"
    rule: "版本号不可随意更改"
    enforcement: "block"
    violationAction: "阻止文档写入"
  - id: "IL005"
    rule: "依赖变更必须用户确认"
    enforcement: "block"
    violationAction: "暂停操作"
  - id: "IL006"
    rule: "虚拟环境配置不可提交到仓库"
    enforcement: "block"
    violationAction: "阻止venv/node_modules提交"
  - id: "IL007"
    rule: "Django settings SECRET_KEY不可硬编码"
    enforcement: "block"
    violationAction: "阻止敏感信息暴露"

recommendations:
  - id: "R001"
    rule: "使用pytest运行测试"
    skipCondition: "用户明确说跳过"
  - id: "R002"
    rule: "单元测试覆盖率>=60%"
    skipCondition: "历史项目无测试框架"
  - id: "R003"
    rule: "使用flake8或black检查代码风格"
    skipCondition: "用户明确说跳过"
  - id: "R004"
    rule: "配置Django DEBUG=False在生产环境"
    skipCondition: "开发环境配置"
  - id: "R005"
    rule: "使用django-debug-toolbar优化查询"
    skipCondition: "生产环境"

antiBypass:
  - id: "AB001"
    excuse: "这是简单修改，不需要测试"
    rebuttal: "简单修改也需要验证，防止回归"
    ironLawRef: "IL003"
  - id: "AB002"
    excuse: "用户没说版本号，我默认用最新的"
    rebuttal: "用户没说=版本不变"
    ironLawRef: "IL004"
  - id: "AB003"
    excuse: "这个bug很简单，直接改一行就行"
    rebuttal: "简单bug也有根因，不分析可能导致类似bug重复出现"
    ironLawRef: "IL002"
  - id: "AB004"
    excuse: "SECRET_KEY放代码里方便调试"
    rebuttal: "敏感信息必须使用环境变量，防止安全风险"
    ironLawRef: "IL007"
  - id: "AB005"
    excuse: "venv文件夹也需要提交"
    rebuttal: "虚拟环境不应提交，使用requirements.txt管理依赖"
    ironLawRef: "IL006"