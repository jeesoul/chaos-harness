identity:
  name: generic-harness
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: scanner
  suitableFor:
    - generic
    - unknown
  confidenceThreshold: 0.5

selfCheck:
  activationConditions:
    - field: "projectType.type"
      operator: "exists"
      value: ""
      description: "Any project type detected"
  warningConditions:
    - field: "projectType.confidence"
      operator: "equals"
      value: "0"
      description: "Project type unknown with no confidence"
  changeMonitor:
    watchedFiles:
      - "package.json"
      - "pom.xml"
      - "build.gradle"
      - "requirements.txt"
      - "Cargo.toml"
    threshold: 3
  redFlags:
    - thought: "I don't know what kind of project this is"
      reality: "Run the scanner to identify the project type. Use generic rules until then."
      ironLawRef: "IL002"
      persuasionPrinciple: "authority"
    - thought: "Generic rules don't apply to my project"
      reality: "Generic rules provide baseline safety. Override with specific template after identification."
      ironLawRef: "IL001"
      persuasionPrinciple: "socialProof"
    - thought: "I'll skip verification just this once"
      reality: "Just this once = always. No exceptions to verification requirements."
      ironLawRef: "IL005"
      persuasionPrinciple: "authority"
    - thought: "This doesn't look like a real project"
      reality: "Your human partner is working on it. Respect their context and provide value."
      ironLawRef: "IL001"
      persuasionPrinciple: "unity"

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory selection before generating documents"
    loopholes:
      - pattern: "no version system needed"
        rebuttal: "Version control prevents chaos. Always use versioned output."
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Run scanner first to gather project information"
    loopholes:
      - pattern: "I can't identify the project"
        rebuttal: "Run scanner anyway. Generic template handles unknown projects."
      - pattern: "scanner will take too long"
        rebuttal: "Scanner is fast. No results = no harness. No exceptions."
  - id: "IL003"
    rule: "NO ENVIRONMENT CLAIMS WITHOUT ACTUAL EXECUTION"
    enforcement: block
    violationAction: "Execute environment checks before reporting status"
  - id: "IL004"
    rule: "NO WORKFLOW STEP SKIP WITHOUT EXPLICIT USER CONSENT"
    enforcement: warn
    violationAction: "Log skipped step and require user acknowledgment"
  - id: "IL005"
    rule: "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
    enforcement: block
    violationAction: "Require verification step before marking complete"
    loopholes:
      - pattern: "I already know it works"
        rebuttal: "Knowing ≠ evidence. Run verification and show output."

loopholeClosure:
  - pattern: "generic template doesn't apply"
    rebuttal: "Generic template applies to ALL projects. It's the baseline minimum."
  - pattern: "this project is special"
    rebuttal: "Every project thinks it's special. Rules still apply. No exceptions."
  - pattern: "I'll figure it out as I go"
    rebuttal: "Figure it out = chaos. Scan first, plan second, execute third."
  - pattern: "no time for process"
    rebuttal: "Process saves time. Skipping process costs more in rework."

recommendations:
  - id: "R001"
    rule: "Run project scanner to identify project type"
    skipCondition: "Scanner already run with high confidence"
  - id: "R002"
    rule: "Document project structure before making changes"
    skipCondition: "Documentation already exists"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "make build"
    withTests: "make test"
  testFramework:
    primary: "Unknown"
  inferredCodeStyle:
    namingConvention: {}
    importStyle: "default"

antiBypass:
  - id: "AB001"
    excuse: "I don't know what kind of project this is"
    rebuttal: "Run the scanner to identify the project type. Use generic rules until then."
    ironLawRef: "IL002"
    persuasionPrinciple: "authority"
  - id: "AB002"
    excuse: "Generic rules don't apply to my project"
    rebuttal: "Generic rules provide baseline safety. Override with specific template after identification."
    ironLawRef: "IL001"
    persuasionPrinciple: "socialProof"

effectivenessLog: "version-logs/effectiveness.md"