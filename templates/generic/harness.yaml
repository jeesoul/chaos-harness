identity:
  name: generic-harness
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: scanner
  suitableFor:
    - generic
    - unknown
  confidenceThreshold: 0.5

selfCheck:
  activationConditions:
    - field: "projectType.type"
      operator: "exists"
      value: ""
      description: "Any project type detected"
  warningConditions:
    - field: "projectType.confidence"
      operator: "equals"
      value: "0"
      description: "Project type unknown with no confidence"
  changeMonitor:
    watchedFiles:
      - "package.json"
      - "pom.xml"
      - "build.gradle"
      - "requirements.txt"
      - "Cargo.toml"
    threshold: 3

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory selection before generating documents"
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Run scanner first to gather project information"
  - id: "IL003"
    rule: "NO ENVIRONMENT CLAIMS WITHOUT ACTUAL EXECUTION"
    enforcement: block
    violationAction: "Execute environment checks before reporting status"
  - id: "IL004"
    rule: "NO WORKFLOW STEP SKIP WITHOUT EXPLICIT USER CONSENT"
    enforcement: warn
    violationAction: "Log skipped step and require user acknowledgment"
  - id: "IL005"
    rule: "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
    enforcement: block
    violationAction: "Require verification step before marking complete"

recommendations:
  - id: "R001"
    rule: "Run project scanner to identify project type"
    skipCondition: "Scanner already run with high confidence"
  - id: "R002"
    rule: "Document project structure before making changes"
    skipCondition: "Documentation already exists"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "echo 'No build command detected'"
    withTests: "echo 'No test command detected'"
  testFramework:
    primary: "unknown"
  inferredCodeStyle:
    namingConvention:
      className: "unknown"
      methodName: "unknown"
      constantName: "unknown"
    importStyle: "unknown"

antiBypass:
  - id: "AB001"
    excuse: "I don't know what kind of project this is"
    rebuttal: "Run the scanner to identify the project type. Use generic rules until then."
    ironLawRef: "R001"
  - id: "AB002"
    excuse: "Generic rules don't apply to my project"
    rebuttal: "Generic rules provide baseline safety. Override with specific template after identification."
    ironLawRef: "IL002"

effectivenessLog: "version-logs/effectiveness.md"
