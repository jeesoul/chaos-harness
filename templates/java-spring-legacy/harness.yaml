identity:
  name: java-spring-legacy-harness
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: scanner
  suitableFor:
    - java-spring-legacy
    - java-8
    - spring-boot-2
    - legacy
  confidenceThreshold: 0.75

selfCheck:
  activationConditions:
    - field: "projectType.type"
      operator: "equals"
      value: "java-spring-legacy"
      description: "Project is Java Spring Boot Legacy (JDK 8)"
    - field: "language.version"
      operator: "matches"
      value: "1\\.8|8\\."
      description: "Java version is 8 (Legacy)"
  warningConditions:
    - field: "language.version"
      operator: "equals"
      value: "1.8.0"
      description: "JDK 8 detected - ensure legacy-compatible dependencies"
    - field: "springBootVersion"
      operator: "matches"
      value: "2\\."
      description: "Spring Boot 2.x - check for deprecated features"
  changeMonitor:
    watchedFiles:
      - "pom.xml"
      - "build.gradle"
      - "application.yml"
      - "application.properties"
      - "src/main/java/**/*.java"
    threshold: 3
  redFlags:
    - thought: "JDK 8 is too old to matter"
      reality: "Large enterprises still use JDK 8. Compatibility is a must, not optional."
      ironLawRef: "IL001"
      persuasionPrinciple: "socialProof"
    - thought: "Legacy code doesn't need tests"
      reality: "Legacy code needs tests MORE. Technical debt compounds without coverage."
      ironLawRef: "IL003"
      persuasionPrinciple: "authority"
    - thought: "I'll just upgrade it to Java 17"
      reality: "Upgrade requires explicit user consent. Migration is a separate project."
      ironLawRef: "IL004"
      persuasionPrinciple: "commitment"
    - thought: "This legacy project is hopeless"
      reality: "Every improvement counts. Start with small, validated changes."
      ironLawRef: "IL002"
      persuasionPrinciple: "unity"

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory selection before generating documents"
    loopholes:
      - pattern: "legacy project doesn't need version control"
        rebuttal: "Legacy projects need version control MORE. History matters."
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Run scanner first to gather project information"
  - id: "IL003"
    rule: "NO ENVIRONMENT CLAIMS WITHOUT ACTUAL EXECUTION"
    enforcement: block
    violationAction: "Execute environment checks before reporting status"
  - id: "IL004"
    rule: "NO WORKFLOW STEP SKIP WITHOUT EXPLICIT USER CONSENT"
    enforcement: warn
    violationAction: "Log skipped step and require user acknowledgment"
  - id: "IL005"
    rule: "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
    enforcement: block
    violationAction: "Require verification step before marking complete"
  - id: "IL006"
    rule: "JDK 8 PROJECTS REQUIRE LEGACY COMPATIBILITY CHECKS"
    enforcement: block
    violationAction: "Verify dependency versions are JDK 8 compatible before changes"
    loopholes:
      - pattern: "I'll just use the latest version"
        rebuttal: "Latest ≠ compatible. Check lombok ≤1.18.20, spring-cloud matching Boot version."

loopholeClosure:
  - pattern: "legacy project, rules don't apply"
    rebuttal: "Legacy projects need rules MORE. Technical debt compounds without discipline."
  - pattern: "JDK 8 is obsolete"
    rebuttal: "Obsolete ≠ unused. Enterprise reality. Deal with it."
  - pattern: "I'll modernize later"
    rebuttal: "Later = never without explicit plan. Work with what exists."
  - pattern: "just upgrade dependencies"
    rebuttal: "Upgrade breaks things. Check compatibility matrix first."

recommendations:
  - id: "R001"
    rule: "Use lombok version ≤1.18.20 for JDK 8 compatibility"
    skipCondition: "Project doesn't use lombok"
  - id: "R002"
    rule: "Match Spring Cloud version to Spring Boot 2.x version"
    skipCondition: "Project doesn't use Spring Cloud"
  - id: "R003"
    rule: "Avoid Java 9+ features (var, Stream.toList(), etc.)"
    skipCondition: "User explicitly requests modernization"
  - id: "R004"
    rule: "Run tests with JDK 8 JVM"
    skipCondition: "No tests configured"
  - id: "R005"
    rule: "Document known issues and workarounds"
    skipCondition: "Already documented"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "mvn clean install -DskipTests"
    withTests: "mvn clean install"
  testFramework:
    primary: "JUnit 4"
    mock: "Mockito"
  inferredCodeStyle:
    namingConvention:
      className: "PascalCase"
      methodName: "camelCase"
      constantName: "SCREAMING_SNAKE_CASE"
    importStyle: "full-qualified"

antiBypass:
  - id: "AB001"
    excuse: "JDK 8 is too old, I'll use modern syntax"
    rebuttal: "JDK 8 projects MUST use JDK 8 syntax. var and Stream.toList() won't compile. Check compatibility."
    ironLawRef: "IL006"
    persuasionPrinciple: "authority"
  - id: "AB002"
    excuse: "Legacy code doesn't need tests"
    rebuttal: "Legacy code needs tests MORE. Every untested legacy line is a time bomb."
    ironLawRef: "IL003"
    persuasionPrinciple: "socialProof"
  - id: "AB003"
    excuse: "I'll upgrade it to Spring Boot 3"
    rebuttal: "Upgrade requires explicit user consent. This is a separate project, not a fix."
    ironLawRef: "IL004"
    persuasionPrinciple: "commitment"
  - id: "AB004"
    excuse: "This legacy project is a mess"
    rebuttal: "Your human partner works with this codebase. Respect their context. Improve incrementally."
    ironLawRef: "IL001"
    persuasionPrinciple: "unity"
  - id: "AB005"
    excuse: "Just update all dependencies to latest"
    rebuttal: "Latest breaks JDK 8. Check: lombok ≤1.18.20, spring-cloud matches Boot 2.x, no Jakarta namespace."
    ironLawRef: "IL006"
    persuasionPrinciple: "authority"

effectivenessLog: "version-logs/effectiveness.md"