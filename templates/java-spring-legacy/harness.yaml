identity:
  name: "java-spring-legacy-harness"
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: "scanner"
  suitableFor:
    - "java-spring-legacy"
    - "Java 8"
    - "Spring Boot 2"
  confidenceThreshold: 0.75

selfCheck:
  activationConditions:
    - field: "projectType"
      operator: "equals"
      value: "java-spring-legacy"
      description: "Project type must be java-spring-legacy"
    - field: "javaVersion"
      operator: "matches"
      value: "^1\\.8\\."
      description: "Java version must be 1.8.x"
  warningConditions:
    - field: "projectType.confidence"
      operator: "matches"
      value: "^0\\.[0-6]"
      description: "Low confidence, recommend manual review"
    - field: "springVersion"
      operator: "matches"
      value: "^1\\."
      description: "Spring Boot 1.x detected, may need migration planning"
    - field: "dependencies.outdated"
      operator: "greaterThan"
      value: "5"
      description: "Many outdated dependencies, security review recommended"
  changeMonitor:
    watchedFiles:
      - "pom.xml"
      - "src/main/java/**/*.java"
      - "src/main/resources/application*.properties"
      - "src/main/resources/application*.yml"
    threshold: 0.25

ironLaws:
  - id: "IL001"
    rule: "没有验证就不声称完成"
    enforcement: "block"
    violationAction: "阻止提交，要求重新验证"
  - id: "IL002"
    rule: "没有根因分析就不修复bug"
    enforcement: "block"
    violationAction: "阻止修复，要求Phase 1调查"
  - id: "IL003"
    rule: "测试失败必须修复"
    enforcement: "block"
    violationAction: "阻止进入下一阶段"
  - id: "IL004"
    rule: "版本号不可随意更改"
    enforcement: "block"
    violationAction: "阻止文档写入"
  - id: "IL005"
    rule: "私服配置变更必须用户确认"
    enforcement: "block"
    violationAction: "暂停操作"
  - id: "IL006"
    rule: "JDK 8兼容性必须保持"
    enforcement: "block"
    violationAction: "阻止使用JDK 11+特性"
  - id: "IL007"
    rule: "javax包命名空间不可更改"
    enforcement: "block"
    violationAction: "阻止jakarta命名空间迁移"

recommendations:
  - id: "R001"
    rule: "使用checkstyle检查代码风格"
    skipCondition: "用户明确说跳过"
  - id: "R002"
    rule: "单元测试覆盖率>=50%"
    skipCondition: "历史项目无测试框架"
  - id: "R003"
    rule: "考虑升级到Spring Boot 2.7 LTS"
    skipCondition: "用户明确拒绝升级"
  - id: "R004"
    rule: "审查已弃用的API使用"
    skipCondition: "快速修复场景"
  - id: "R005"
    rule: "检查依赖安全漏洞"

antiBypass:
  - id: "AB001"
    excuse: "这是简单修改，不需要测试"
    rebuttal: "简单修改也需要验证，防止回归"
    ironLawRef: "IL003"
  - id: "AB002"
    excuse: "用户没说版本号，我默认用最新的"
    rebuttal: "用户没说=版本不变"
    ironLawRef: "IL004"
  - id: "AB003"
    excuse: "这个bug很简单，直接改一行就行"
    rebuttal: "简单bug也有根因，不分析可能导致类似bug重复出现"
    ironLawRef: "IL002"
  - id: "AB004"
    excuse: "JDK 11新特性更方便，可以用"
    rebuttal: "legacy项目必须保持JDK 8兼容性"
    ironLawRef: "IL006"
  - id: "AB005"
    excuse: "jakarta是新的标准，应该迁移"
    rebuttal: "legacy项目保持javax命名空间，迁移需要完整计划"
    ironLawRef: "IL007"