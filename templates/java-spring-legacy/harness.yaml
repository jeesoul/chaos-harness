identity:
  name: java-spring-legacy-harness
  version: "1.0.0"
  createdAt: "2026-04-02"
  createdBy: scanner
  suitableFor:
    - java-spring-legacy
    - spring-boot-legacy
    - java-1.8
    - jdk8
    - legacy
  confidenceThreshold: 0.75

selfCheck:
  activationConditions:
    - field: "projectType.type"
      operator: "equals"
      value: "java-spring-legacy"
      description: "Project is legacy Java Spring Boot (JDK 8)"
    - field: "language.version"
      operator: "matches"
      value: '1\.[0-8]'
      description: "Using Java 8 or earlier"
  warningConditions:
    - field: "localEnv"
      operator: "contains"
      value: "jdk-legacy"
      description: "JDK 8 environment issues detected"
  changeMonitor:
    watchedFiles:
      - "pom.xml"
      - "build.gradle"
      - "application.yml"
      - "application.properties"
      - ".java-version"
    threshold: 5

ironLaws:
  - id: "IL001"
    rule: "NO DOCUMENTS WITHOUT VERSION LOCK"
    enforcement: block
    violationAction: "Require version directory selection before generating documents"
  - id: "IL002"
    rule: "NO HARNESS WITHOUT SCAN RESULTS"
    enforcement: block
    violationAction: "Run scanner first to gather project information"
  - id: "IL003"
    rule: "NO ENVIRONMENT CLAIMS WITHOUT ACTUAL EXECUTION"
    enforcement: block
    violationAction: "Execute environment checks before reporting status"
  - id: "IL004"
    rule: "NO WORKFLOW STEP SKIP WITHOUT EXPLICIT USER CONSENT"
    enforcement: warn
    violationAction: "Log skipped step and require user acknowledgment"
  - id: "IL005"
    rule: "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
    enforcement: block
    violationAction: "Require verification step before marking complete"
  - id: "IL006"
    rule: "JDK 8 PROJECTS REQUIRE LEGACY COMPATIBILITY CHECKS"
    enforcement: warn
    violationAction: "Verify JDK 8 compatibility for all changes"

recommendations:
  - id: "R001"
    rule: "Use Spring Boot 2.x compatible dependencies"
    skipCondition: "Already on Spring Boot 3.x"
    skipRecord: "Record Spring Boot version in scan results"
  - id: "R002"
    rule: "Avoid Java 9+ language features"
    skipCondition: "Project planned for upgrade"
  - id: "R003"
    rule: "Run tests with JDK 8 environment"
    skipCondition: "No tests available"
  - id: "R004"
    rule: "Document legacy workarounds in VERSION-LOG.md"
    skipCondition: "No workarounds needed"

dynamicRules:
  privateRepositories: []
  buildCommands:
    standard: "mvn clean install -DskipTests"
    withTests: "mvn clean install"
  testFramework:
    primary: "junit4"
    mock: "mockito"
  inferredCodeStyle:
    namingConvention:
      className: "PascalCase"
      methodName: "camelCase"
      constantName: "SCREAMING_SNAKE_CASE"
    importStyle: "wildcard-avoid"

antiBypass:
  - id: "AB001"
    excuse: "JDK 8 is too old to worry about"
    rebuttal: "JDK 8 is still widely used in enterprises. Proper handling prevents production issues."
    ironLawRef: "IL006"
  - id: "AB002"
    excuse: "Legacy code doesn't need tests"
    rebuttal: "Legacy code needs tests more than new code to prevent regressions during changes."
    ironLawRef: "R003"
  - id: "AB003"
    excuse: "I'll upgrade to newer Java later"
    rebuttal: "Document the upgrade plan in VERSION-LOG.md and track progress properly."
    ironLawRef: "IL001"

effectivenessLog: "version-logs/effectiveness.md"
