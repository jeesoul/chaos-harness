name: CI

on:
  push:
    branches: [main, v1.4.0]
  pull_request:
    branches: [main, v1.4.0]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 1: Check all .mjs script syntax
      - name: Check .mjs syntax
        run: |
          find . -name '*.mjs' -not -path './node_modules/*' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f ..."
            node -c "$f"
          done

      # Step 2: Run gate-machine tests
      - name: Run tests
        run: node tests/gate-machine.test.mjs

      # Step 3: Validate hooks.json format
      - name: Validate hooks.json
        run: node -e 'JSON.parse(require("fs").readFileSync("hooks/hooks.json", "utf8")); console.log("hooks.json: valid")'

      # Step 4: Check SKILL.md frontmatter (must have name/description/version)
      - name: Check SKILL.md frontmatter
        run: |
          ERRORS=""
          while IFS= read -r -d '' f; do
            FM=$(sed -n '/^---$/,/^---$/p' "$f")
            if [ -z "$FM" ]; then
              ERRORS="${ERRORS}FAIL: $f -- no frontmatter found\n"
              continue
            fi
            for KEY in name description version; do
              if ! echo "$FM" | grep -qi "^${KEY}:"; then
                ERRORS="${ERRORS}FAIL: $f -- missing '${KEY}' in frontmatter\n"
              fi
            done
          done < <(find . -name 'SKILL.md' -not -path './node_modules/*' -print0)
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS"
            echo "Frontmatter check failed"
            exit 1
          fi
          echo "All SKILL.md frontmatter: valid"

      # Step 5: Check critical gate-machine files exist
      - name: Check critical files
        run: |
          FILES=(
            "scripts/gate-machine.mjs"
            "scripts/gate-validator.mjs"
            "scripts/gate-recovery.mjs"
            "scripts/gate-enforcer.mjs"
          )
          FAIL=0
          for F in "${FILES[@]}"; do
            if [ ! -f "$F" ]; then
              echo "FAIL: missing $F"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "Critical file check failed"
            exit 1
          fi
          echo "All critical files present"
