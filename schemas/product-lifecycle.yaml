name: product-lifecycle
version: "1.0"
description: "产品全生命周期工作流"

stages:
  - id: P01_discovery
    name: "市场发现"
    artifacts:
      - id: market_research
        type: document
        required: true
        validation:
          - type: word_count
            min: 1000
    dependencies: []
    iron_laws: [IL001]
    multi_agent_required: false

  - id: P02_definition
    name: "产品定义"
    artifacts:
      - id: prd
        type: document
        required: true
        validation:
          - type: section_check
            sections: [problem, solution, target_audience, success_metrics]
    dependencies: [P01_discovery]
    iron_laws: [IL001]
    multi_agent_required: true

  - id: P03_technical_analysis
    name: "技术可行性分析"
    artifacts:
      - id: tech_analysis
        type: document
        required: true
    dependencies: [P02_definition]
    iron_laws: [IL001, IL002]
    multi_agent_required: true

  - id: P04_design
    name: "系统设计"
    artifacts:
      - id: design_doc
        type: document
        required: true
    dependencies: [P02_definition, P03_technical_analysis]
    iron_laws: [IL001, IL002]
    multi_agent_required: true

  - id: P05_planning
    name: "项目计划"
    artifacts:
      - id: project_plan
        type: document
        required: true
    dependencies: [P04_design]
    iron_laws: [IL001]
    multi_agent_required: false

  - id: P08_testing
    name: "测试验证"
    artifacts:
      - id: test_report
        type: document
        required: true
    dependencies: [P05_planning]
    iron_laws: [IL001, IL003]
    multi_agent_required: true

  - id: P09_release
    name: "发布部署"
    artifacts:
      - id: release_plan
        type: document
        required: true
    dependencies: [P08_testing]
    iron_laws: [IL001, IL005]
    multi_agent_required: true

  - id: P10_feedback
    name: "用户反馈"
    artifacts:
      - id: feedback_report
        type: document
        required: false
    dependencies: [P09_release]
    iron_laws: [IL001]
    multi_agent_required: false

  - id: P11_documentation
    name: "文档更新"
    artifacts:
      - id: updated_docs
        type: document
        required: true
    dependencies: [P09_release]
    iron_laws: [IL001]
    multi_agent_required: false

transitions:
  - from: P01_discovery
    to: P02_definition
    conditions:
      - artifact_complete: market_research
      - review_passed: true

  - from: P02_definition
    to: P03_technical_analysis
    conditions:
      - artifact_complete: prd
      - review_passed: true

  - from: P02_definition
    to: P04_design
    conditions:
      - artifact_complete: prd

  - from: P03_technical_analysis
    to: P04_design
    conditions:
      - artifact_complete: tech_analysis

  - from: P04_design
    to: P05_planning
    conditions:
      - artifact_complete: design_doc
      - review_passed: true

  - from: P05_planning
    to: P08_testing
    conditions:
      - artifact_complete: project_plan

  - from: P08_testing
    to: P09_release
    conditions:
      - artifact_complete: test_report
      - review_passed: true

  - from: P09_release
    to: P10_feedback
    conditions:
      - artifact_complete: release_plan

  - from: P09_release
    to: P11_documentation
    conditions:
      - artifact_complete: release_plan

validation_rules:
  - id: version_check
    description: "所有工件必须在版本目录下"
    check: "file_path.startsWith('output/' + version)"
    severity: critical
